name: book_manager
description: Aplicación de gestión editorial con inventario, pedidos y escáner QR
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Íconos
  cupertino_icons: ^1.0.6
  
  # Escáner QR y códigos de barras
  mobile_scanner: ^4.0.1
  
  # Vibración al escanear
  vibration: ^1.8.4
  
  # Generar códigos QR
  qr_flutter: ^4.1.0
  flutter_animate: ^4.5.2
  flutter_slidable: ^3.1.2
  go_router: ^14.8.1
  lottie: ^3.3.1
  web: ^1.1.1
  pdf: ^3.12.0
  printing: ^5.14.3
  image_picker: ^1.1.2
  url_launcher: ^6.3.2
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
