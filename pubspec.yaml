name: book_manager
description: Aplicación de gestión editorial con inventario, pedidos y escáner QR
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Íconos
  cupertino_icons: ^1.0.6
  
  # Escáner QR y códigos de barras
  mobile_scanner: ^4.0.1
  
  # Vibración al escanear
  vibration: ^1.8.4
  
  # Generar códigos QR
  qr_flutter: ^4.1.0
  sqflite: ^2.4.2
  path: ^1.9.1
  sqflite_common_ffi_web: ^1.1.1
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
